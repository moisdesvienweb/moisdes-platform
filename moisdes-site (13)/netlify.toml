[build]
  publish = "public"

[build.environment]
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type                = "application/javascript; charset=utf-8"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/*.css"
  [headers.values]
    Content-Type                = "text/css; charset=utf-8"
    Access-Control-Allow-Origin = "*"

[[redirects]]
  from   = "/:splat"
  to     = "/:splat/index.html"
  status = 200
  conditions = {Path = ["/:splat"]}
