[build]
  publish = "public"

[build.environment]
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type                = "application/javascript; charset=utf-8"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "POST, GET, OPTIONS"

# Public form pages — all /form/* routes serve the same HTML
[[redirects]]
  from   = "/form/*"
  to     = "/form/index.html"
  status = 200

# Clean URL fallback
[[redirects]]
  from   = "/:splat"
  to     = "/:splat/index.html"
  status = 200
